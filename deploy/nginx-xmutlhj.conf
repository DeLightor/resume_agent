# Nginx 配置文件 - resume_agent
# 域名: xmutlhj.eu.cc
# 部署路径: /etc/nginx/sites-available/xmutlhj.eu.cc
# 启用命令: ln -s /etc/nginx/sites-available/xmutlhj.eu.cc /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name xmutlhj.eu.cc www.xmutlhj.eu.cc;

    # 前端 + API 都通过 5173 端口（Vite 代理 /api 到后端 8000）
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:5173;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件大小限制
    client_max_body_size 100m;
}
